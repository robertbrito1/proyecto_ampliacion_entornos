<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M&J - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        /* Diseño Responsive */
        /* Paleta de colores: Fondo oscuro y detalles dorados */
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Poppins', sans-serif;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .brand-title {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 700;
            color: #d4af37;
            /* Color Oro */
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            margin-bottom: 5px;
            letter-spacing: 2px;
            text-align: center;
        }

        .brand-subtitle {
            color: #ffffff;
            font-style: italic;
            font-size: 1rem;
            margin-bottom: 25px;
            text-align: center;
            opacity: 0.8;
        }

        /* Card con efecto cristalizado */
        .card-glass {
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px 25px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 12px 15px;
            border-radius: 10px;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #d4af37;
            color: #fff;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .form-label {
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            opacity: 0.9;
        }

        .btn-confirmar {
            background: #d4af37;
            color: #000;
            font-weight: bold;
            border: none;
            padding: 12px;
            border-radius: 10px;
            transition: all 0.3s;
        }

        .btn-confirmar:hover {
            background: #b5952f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        .btn-outline-custom {
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: transparent;
            padding: 12px;
            border-radius: 10px;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-outline-custom:hover {
            background: rgba(212, 175, 55, 0.2);
            color: #d4af37;
            border-color: #d4af37;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card-glass">
                    <h1 class="brand-title">M&J</h1>
                    <p class="brand-subtitle">Experiencia Gastronómica</p>

                    <!-- Formulario de Mockup (No hace POST, redirige con JS) -->
                    <form onsubmit="entrarAdmin(event)">
                        <div class="mb-3">
                            <label for="id_username" class="form-label">Usuario</label>
                            <input type="text" name="username" autofocus class="form-control" id="id_username"
                                placeholder="admin">
                        </div>
                        <div class="mb-4">
                            <label for="id_password" class="form-label">Contraseña</label>
                            <input type="password" name="password" class="form-control" id="id_password"
                                placeholder="••••••••">
                        </div>
                        <a href="admin.html" class="btn btn-confirmar w-100 mb-2">Entrar como Administrador</a>
                    </form>

                    <div class="position-relative mt-4 mb-4">
                        <hr class="border-secondary opacity-50">
                        <span class="position-absolute top-50 start-50 translate-middle px-3"
                            style="background: rgba(25, 25, 25, 1); font-size: 0.8rem; color: #888; border-radius: 5px;">O</span>
                    </div>

                    <!-- Enlace directo a la vista de cliente/usuario -->
                    <a href="user.html" class="btn btn-outline-custom w-100">Ingresar como Cliente</a>
                </div>
            </div>
        </div>
    </div>


</body>

</html>
